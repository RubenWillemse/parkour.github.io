<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Realistic Shooter</title>
<style>
  body {
    margin: 0;
    background: #0d0d0d;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
    font-family: Arial;
  }
  canvas {
    background: #1a1a1a;
    border-radius: 10px;
    cursor: crosshair;
  }
</style>
</head>
<body>

<canvas id="game" width="900" height="550"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const keys = {};
let mouse = { x: 0, y: 0 };

let player = {
  x: 450,
  y: 275,
  angle: 0,
  speed: 2.2,
  health: 100,
  ammo: 12,
  maxAmmo: 12,
  reloadTime: 0,
  lastShot: 0
};

let bullets = [];
let enemies = [];
let particles = [];
let score = 0;
let gameOver = false;

window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

canvas.addEventListener("mousemove", e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = e.clientX - r.left;
  mouse.y = e.clientY - r.top;
});

canvas.addEventListener("mousedown", shoot);

function shoot() {
  const now = Date.now();
  if (gameOver || player.reloadTime > 0) return;
  if (player.ammo <= 0) return;
  if (now - player.lastShot < 180) return;

  player.lastShot = now;
  player.ammo--;

  let spread = (Math.random() - 0.5) * 0.08;
  let angle = player.angle + spread;

  bullets.push({
    x: player.x,
    y: player.y,
    dx: Math.cos(angle) * 9,
    dy: Math.sin(angle) * 9
  });
}

function spawnEnemy() {
  enemies.push({
    x: Math.random() < 0.5 ? -30 : canvas.width + 30,
    y: Math.random() * canvas.height,
    health: 60,
    speed: 1.2
  });
}
setInterval(spawnEnemy, 1400);

function update() {
  if (gameOver) return;

  // Reload
  if (keys["r"] && player.ammo < player.maxAmmo && player.reloadTime === 0) {
    player.reloadTime = 60;
  }
  if (player.reloadTime > 0) {
    player.reloadTime--;
    if (player.reloadTime === 0) player.ammo = player.maxAmmo;
  }

  // Movement
  if (keys["w"]) player.y -= player.speed;
  if (keys["s"]) player.y += player.speed;
  if (keys["a"]) player.x -= player.speed;
  if (keys["d"]) player.x += player.speed;

  player.x = Math.max(30, Math.min(canvas.width - 30, player.x));
  player.y = Math.max(30, Math.min(canvas.height - 30, player.y));

  player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

  // Bullets
  bullets.forEach(b => {
    b.x += b.dx;
    b.y += b.dy;
  });
  bullets = bullets.filter(b =>
    b.x > 0 && b.x < canvas.width && b.y > 0 && b.y < canvas.height
  );

  // Enemies
  enemies.forEach(e => {
    let dist = Math.hypot(player.x - e.x, player.y - e.y);
    let angle = Math.atan2(player.y - e.y, player.x - e.x);

    if (dist > 60) {
      e.x += Math.cos(angle) * e.speed;
      e.y += Math.sin(angle) * e.speed;
    } else {
      player.health -= 0.15;
    }
  });

  // Collisions
  bullets.forEach((b, bi) => {
    enemies.forEach((e, ei) => {
      if (Math.hypot(b.x - e.x, b.y - e.y) < 12) {
        bullets.splice(bi, 1);
        e.health -= 35;

        for (let i = 0; i < 6; i++) {
          particles.push({
            x: b.x,
            y: b.y,
            dx: (Math.random() - 0.5) * 3,
            dy: (Math.random() - 0.5) * 3,
            life: 20
          });
        }

        if (e.health <= 0) {
          enemies.splice(ei, 1);
          score++;
        }
      }
    });
  });

  // Particles
  particles.forEach(p => {
    p.x += p.dx;
    p.y += p.dy;
    p.life--;
  });
  particles = particles.filter(p => p.life > 0);

  if (player.health <= 0) gameOver = true;
}

function drawHuman(x, y, angle, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.fillStyle = color;

  ctx.fillRect(-4, 6, 8, 14); // body
  ctx.beginPath();
  ctx.arc(0, -6, 6, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillRect(4, 6, 14, 3); // gun
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawHuman(player.x, player.y, player.angle, "#5dade2");
  enemies.forEach(e => drawHuman(e.x, e.y, 0, "#c0392b"));

  ctx.fillStyle = "yellow";
  bullets.forEach(b => ctx.fillRect(b.x, b.y, 3, 3));

  ctx.fillStyle = "darkred";
  particles.forEach(p => ctx.fillRect(p.x, p.y, 2, 2));

  // UI
  ctx.fillStyle = "white";
  ctx.fillText("Score: " + score, 10, 20);
  ctx.fillText("Ammo: " + player.ammo + "/" + player.maxAmmo, 10, 40);

  ctx.fillStyle = "red";
  ctx.fillRect(10, 55, 100, 8);
  ctx.fillStyle = "lime";
  ctx.fillRect(10, 55, player.health, 8);

  if (gameOver) {
    ctx.font = "40px Arial";
    ctx.fillText("GAME OVER", 330, 280);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
